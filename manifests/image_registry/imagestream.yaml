apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: test-registry-pull
spec:
  lookupPolicy:
    local: true
  tags:
  - name: latest
    from:
      kind: DockerImage
      name: quay.io/fedora/fedora:latest
    importPolicy:
      scheduled: false
    referencePolicy:
      type: Local
